<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رفع ميزان المراجعة</title>
    <!-- تضمين مكتبة SheetJS لقراءة ملفات الإكسيل -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f4f7f6; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .drop-zone { border: 2px dashed #007bff; border-radius: 10px; padding: 40px; text-align: center; cursor: pointer; background-color: #f8f9fa; transition: background 0.3s; }
        .drop-zone.dragover { background-color: #e2e6ea; border-color: #0056b3; }
        .status-message { margin-top: 20px; padding: 15px; border-radius: 5px; font-weight: bold; display: none; }
        .status-success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status-error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .mapping-section { margin-top: 30px; display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: right; }
        th { background-color: #007bff; color: white; }
        select { padding: 8px; width: 100%; border-radius: 4px; border: 1px solid #ccc; }
        .btn-save { background-color: #28a745; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; margin-top: 20px; width: 100%; }
        .btn-save:hover { background-color: #218838; }
    </style>
</head>
<body>

<div class="container">
    <h2>رفع ميزان المراجعة</h2>
    <p>قم بسحب وإفلات ملف الإكسيل هنا أو اضغط لاختيار الملف.</p>

    <!-- منطقة السحب والإفلات -->
    <div class="drop-zone" id="dropZone">
        اسحب وأفلت ملف الإكسيل هنا<br>أو اضغط للاختيار
        <input type="file" id="fileInput" accept=".xlsx, .xls" style="display: none;">
    </div>

    <!-- رسالة حالة الميزان -->
    <div id="statusMessage" class="status-message"></div>

    <!-- قسم توجيه الحسابات (مخفي افتراضياً) -->
    <div id="mappingSection" class="mapping-section">
        <h3>توجيه الحسابات (Account Mapping)</h3>
        <p>قم باختيار التصنيف المناسب لكل حساب:</p>
        <table id="mappingTable">
            <thead>
                <tr>
                    <th>كود الحساب</th>
                    <th>اسم الحساب</th>
                    <th>الرصيد</th>
                    <th>تصنيف IFRS</th>
                </tr>
            </thead>
            <tbody>
                <!-- سيتم حقن الحسابات هنا برمجياً -->
            </tbody>
        </table>
        <button class="btn-save" onclick="saveMapping()">حفظ التوجيه والانتقال</button>
    </div>
</div>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const statusMessage = document.getElementById('statusMessage');
    const mappingSection = document.getElementById('mappingSection');
    const mappingTableBody = document.querySelector('#mappingTable tbody');

    // تصنيفات IFRS المقترحة
    const ifrsCategories = [
        "اختر التصنيف...",
        "أصول غير متداولة (Non-Current Assets)",
        "أصول متداولة (Current Assets)",
        "التزامات غير متداولة (Non-Current Liabilities)",
        "التزامات متداولة (Current Liabilities)",
        "حقوق الملكية (Equity)",
        "إيرادات (Revenues)",
        "تكلفة المبيعات (Cost of Sales)",
        "مصروفات تشغيلية (Operating Expenses)"
    ];

    // تفعيل النقر على منطقة السحب
    dropZone.addEventListener('click', () => fileInput.click());

    // تأثيرات السحب والإفلات
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length) {
            handleFile(e.dataTransfer.files[0]);
        }
    });

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length) {
            handleFile(e.target.files[0]);
        }
    });

    // معالجة الملف المقروء
    function handleFile(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            
            // قراءة الشيت الأول
            const firstSheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheetName];
            
            // تحويل البيانات إلى JSON
            const jsonData = XLSX.utils.sheet_to_json(worksheet);
            
            validateAndProcessData(jsonData);
        };
        reader.readAsArrayBuffer(file);
    }

    // التحقق من اتزان الميزان ومعالجة البيانات
    function validateAndProcessData(data) {
        let totalDebit = 0;
        let totalCredit = 0;
        const uniqueAccounts = [];

        data.forEach(row => {
            // افتراض أن أسماء الأعمدة في الإكسيل هي "مدين" و "دائن"
            const debit = parseFloat(row['مدين'] || row['Debit'] || 0);
            const credit = parseFloat(row['دائن'] || row['Credit'] || 0);
            
            totalDebit += debit;
            totalCredit += credit;

            // استخراج الحسابات لتوجيهها لاحقاً
            if (row['اسم الحساب'] || row['Account Name']) {
                uniqueAccounts.push({
                    code: row['كود الحساب'] || row['Account Code'] || '-',
                    name: row['اسم الحساب'] || row['Account Name'],
                    balance: debit > 0 ? debit + ' (مدين)' : credit + ' (دائن)'
                });
            }
        });

        // التحقق من الاتزان (نسمح بفارق بسيط جداً للكسور العشرية)
        const isBalanced = Math.abs(totalDebit - totalCredit) < 0.1;

        if (isBalanced) {
            statusMessage.textContent = "✅ ممتاز! تمت قراءة الميزان بنجاح، والميزان متزن. إجمالي المدين: " + totalDebit.toFixed(2) + " = إجمالي الدائن: " + totalCredit.toFixed(2);
            statusMessage.className = "status-message status-success";
            statusMessage.style.display = "block";
            
            // عرض شاشة التوجيه
            renderMappingScreen(uniqueAccounts);
        } else {
            statusMessage.textContent = "❌ خطأ! الميزان غير متزن. إجمالي المدين (" + totalDebit.toFixed(2) + ") لا يساوي إجمالي الدائن (" + totalCredit.toFixed(2) + "). يرجى مراجعة الملف.";
            statusMessage.className = "status-message status-error";
            statusMessage.style.display = "block";
            mappingSection.style.display = "none";
        }
    }

    // بناء شاشة توجيه الحسابات
    function renderMappingScreen(accounts) {
        mappingTableBody.innerHTML = ''; // مسح البيانات القديمة

        accounts.forEach(acc => {
            const tr = document.createElement('tr');
            
            // إنشاء قائمة التصنيفات المنسدلة
            let selectHTML = `<select class="category-select" data-acc-code="${acc.code}">`;
            ifrsCategories.forEach(cat => {
                selectHTML += `<option value="${cat}">${cat}</option>`;
            });
            selectHTML += `</select>`;

            tr.innerHTML = `
                <td>${acc.code}</td>
                <td>${acc.name}</td>
                <td>${acc.balance}</td>
                <td>${selectHTML}</td>
            `;
            mappingTableBody.appendChild(tr);
        });

        // إظهار القسم
        mappingSection.style.display = "block";
    }

    // دالة حفظ التوجيهات
    function saveMapping() {
        const selects = document.querySelectorAll('.category-select');
        const mappingData = [];
        
        selects.forEach(select => {
            mappingData.push({
                accountCode: select.getAttribute('data-acc-code'),
                category: select.value
            });
        });

        // حفظ البيانات في LocalStorage لتستخدمها الصفحات الأخرى
        localStorage.setItem('accountMapping', JSON.stringify(mappingData));
        alert("تم حفظ توجيه الحسابات بنجاح! سيتم نقلك الآن لصفحة إعداد القوائم.");
        
        // الانتقال إلى الصفحة التالية (يمكنك تعديل الرابط حسب مشروعك)
        // window.location.href = 'statements.html';
    }
</script>

</body>
</html>
