<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رفع ميزان المراجعة | FinSight</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #1a365d;
            --secondary: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 40px 20px; 
        }
        .container { 
            max-width: 900px; 
            margin: 0 auto; 
            background: var(--surface); 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
        }
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        h2 { margin: 0; color: var(--primary); }
        
        /* زر تحميل القالب */
        .btn-template {
            background-color: var(--surface);
            color: var(--secondary);
            border: 2px solid var(--secondary);
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-template:hover {
            background-color: var(--secondary);
            color: white;
        }

        /* منطقة السحب والإفلات */
        .drop-zone { 
            border: 2px dashed #cbd5e1; 
            border-radius: 12px; 
            padding: 50px 20px; 
            text-align: center; 
            cursor: pointer; 
            background-color: #f1f5f9; 
            transition: all 0.3s; 
            margin-bottom: 20px;
        }
        .drop-zone:hover, .drop-zone.dragover { 
            background-color: #e2e8f0; 
            border-color: var(--secondary); 
        }
        .drop-zone p { margin: 10px 0; color: #64748b; font-size: 16px; }

        /* الرسائل */
        .status-message { 
            margin-top: 20px; 
            padding: 15px 20px; 
            border-radius: 8px; 
            font-weight: bold; 
            display: none; 
            animation: fadeIn 0.5s ease;
        }
        .status-success { background-color: #d1fae5; color: #065f46; border: 1px solid #34d399; }
        .status-error { background-color: #fee2e2; color: #991b1b; border: 1px solid #f87171; }

        /* جدول التوجيه */
        .mapping-section { margin-top: 40px; display: none; animation: fadeIn 0.5s ease; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        th, td { padding: 15px; border-bottom: 1px solid var(--border); text-align: right; }
        th { background-color: var(--primary); color: white; border-top-right-radius: 8px; border-top-left-radius: 8px; }
        tr:hover { background-color: #f8fafc; }
        select { 
            padding: 10px; 
            width: 100%; 
            border-radius: 6px; 
            border: 1px solid #cbd5e1; 
            background-color: #fff;
            outline: none;
        }
        select:focus { border-color: var(--secondary); }
        
        .btn-save { 
            background-color: var(--success); 
            color: white; 
            border: none; 
            padding: 15px 30px; 
            font-size: 16px; 
            font-weight: bold;
            border-radius: 8px; 
            cursor: pointer; 
            margin-top: 30px; 
            width: 100%; 
            transition: background 0.3s;
        }
        .btn-save:hover { background-color: #059669; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header-actions">
        <h2>استيراد ميزان المراجعة</h2>
        <button class="btn-template" onclick="downloadTemplate()">
            <span>📥</span> تحميل قالب الإكسيل الفارغ
        </button>
    </div>

    <div class="drop-zone" id="dropZone">
        <h3>اسحب وأفلت ملف ميزان المراجعة هنا</h3>
        <p>أو اضغط لاختيار الملف من جهازك (صيغة xlsx أو xls)</p>
        <input type="file" id="fileInput" accept=".xlsx, .xls" style="display: none;">
    </div>

    <div id="statusMessage" class="status-message"></div>

    <div id="mappingSection" class="mapping-section">
        <h3 style="color: var(--primary); margin-bottom: 10px;">توجيه الحسابات (Account Mapping)</h3>
        <p style="color: #64748b; margin-bottom: 20px;">النظام اكتشف الحسابات التالية، يرجى ربطها بتصنيفات المعايير الدولية (IFRS) المناسبة:</p>
        
        <table id="mappingTable">
            <thead>
                <tr>
                    <th>كود الحساب</th>
                    <th>اسم الحساب</th>
                    <th>الرصيد الصافي</th>
                    <th style="width: 35%;">تصنيف الحساب (IFRS)</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
        <button class="btn-save" onclick="saveMapping()">حفظ التوجيه واعتماد البيانات</button>
    </div>
</div>
